<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1250" viewBox="0 0 1600 1250" role="img" aria-labelledby="title desc">
  <title id="title">Modelo conceitual do banco de dados</title>
  <desc id="desc">Diagrama conceitual com as entidades roles, colaboradores, clientes, pedidos, materiais, pedido_materiais e pagamentos.</desc>
  <defs>
    <style>
      .bg { fill: #f6f3ee; }
      .card { fill: #fffdf9; stroke: #2f3a45; stroke-width: 2; rx: 18; ry: 18; }
      .header { fill: #0f6b3b; rx: 18; ry: 18; }
      .headerText { fill: #ffffff; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; }
      .bodyText { fill: #23313d; font-family: Arial, sans-serif; font-size: 18px; }
      .smallText { fill: #556370; font-family: Arial, sans-serif; font-size: 16px; }
      .line { stroke: #394754; stroke-width: 3; fill: none; }
      .label { fill: #23313d; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .title { fill: #23313d; font-family: Arial, sans-serif; font-size: 34px; font-weight: bold; }
      .subtitle { fill: #556370; font-family: Arial, sans-serif; font-size: 20px; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#394754"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1250"/>
  <text class="title" x="800" y="58" text-anchor="middle">Banco de Dados Conceitual</text>
  <text class="subtitle" x="800" y="90" text-anchor="middle">Dashboard</text>

  <g transform="translate(90 150)">
    <rect class="card" width="300" height="150"/>
    <rect class="header" width="300" height="48"/>
    <text class="headerText" x="150" y="31" text-anchor="middle">roles</text>
    <text class="bodyText" x="20" y="78">PK id</text>
    <text class="bodyText" x="20" y="108">nome</text>
    <text class="bodyText" x="20" y="138">nivel_acesso</text>
  </g>

  <g transform="translate(90 420)">
    <rect class="card" width="300" height="250"/>
    <rect class="header" width="300" height="48"/>
    <text class="headerText" x="150" y="31" text-anchor="middle">colaboradores</text>
    <text class="bodyText" x="20" y="78">PK id</text>
    <text class="bodyText" x="20" y="108">nome</text>
    <text class="bodyText" x="20" y="138">email</text>
    <text class="bodyText" x="20" y="168">senha</text>
    <text class="bodyText" x="20" y="198">telefone</text>
    <text class="bodyText" x="20" y="228">FK role_id</text>
  </g>

  <g transform="translate(640 150)">
    <rect class="card" width="320" height="320"/>
    <rect class="header" width="320" height="48"/>
    <text class="headerText" x="160" y="31" text-anchor="middle">clientes</text>
    <text class="bodyText" x="20" y="78">PK id</text>
    <text class="bodyText" x="20" y="108">nome</text>
    <text class="bodyText" x="20" y="138">email</text>
    <text class="bodyText" x="20" y="168">telefone</text>
    <text class="bodyText" x="20" y="198">cpf_cnpj</text>
    <text class="bodyText" x="20" y="228">hash_cpf</text>
    <text class="bodyText" x="20" y="258">endereco</text>
    <text class="bodyText" x="20" y="288">observacoes</text>
  </g>

  <g transform="translate(640 530)">
    <rect class="card" width="320" height="350"/>
    <rect class="header" width="320" height="48"/>
    <text class="headerText" x="160" y="31" text-anchor="middle">pedidos</text>
    <text class="bodyText" x="20" y="78">PK id</text>
    <text class="bodyText" x="20" y="108">FK colaborador_id</text>
    <text class="bodyText" x="20" y="138">FK cliente_id</text>
    <text class="bodyText" x="20" y="168">descricao</text>
    <text class="bodyText" x="20" y="198">valor</text>
    <text class="bodyText" x="20" y="228">data_entrada</text>
    <text class="bodyText" x="20" y="258">data_entrega</text>
    <text class="bodyText" x="20" y="288">horario_entrega</text>
    <text class="bodyText" x="20" y="318">status_pedido</text>
  </g>

  <g transform="translate(1180 150)">
    <rect class="card" width="300" height="270"/>
    <rect class="header" width="300" height="48"/>
    <text class="headerText" x="150" y="31" text-anchor="middle">materiais</text>
    <text class="bodyText" x="20" y="78">PK id</text>
    <text class="bodyText" x="20" y="108">tipo</text>
    <text class="bodyText" x="20" y="138">cor</text>
    <text class="bodyText" x="20" y="168">espessura</text>
    <text class="bodyText" x="20" y="198">altura</text>
    <text class="bodyText" x="20" y="228">largura</text>
    <text class="bodyText" x="20" y="258">preco_m2</text>
  </g>

  <g transform="translate(1130 500)">
    <rect class="card" width="350" height="180"/>
    <rect class="header" width="350" height="48"/>
    <text class="headerText" x="175" y="31" text-anchor="middle">pedido_materiais</text>
    <text class="bodyText" x="20" y="78">PK id</text>
    <text class="bodyText" x="20" y="108">FK pedido_id</text>
    <text class="bodyText" x="20" y="138">FK material_id</text>
    <text class="bodyText" x="20" y="168">quantidade</text>
  </g>

  <g transform="translate(640 950)">
    <rect class="card" width="320" height="250"/>
    <rect class="header" width="320" height="48"/>
    <text class="headerText" x="160" y="31" text-anchor="middle">pagamentos</text>
    <text class="bodyText" x="20" y="78">PK id</text>
    <text class="bodyText" x="20" y="108">FK pedido_id</text>
    <text class="bodyText" x="20" y="138">forma_pagamento</text>
    <text class="bodyText" x="20" y="168">status_pagamento</text>
    <text class="bodyText" x="20" y="198">valor_pago</text>
    <text class="bodyText" x="20" y="228">data_pagamento</text>
  </g>

  <path class="line" marker-end="url(#arrow)" d="M240 300 L240 420"/>
  <text class="label" x="254" y="365">1:N</text>

  <path class="line" marker-end="url(#arrow)" d="M390 545 L640 620"/>
  <text class="label" x="485" y="565">1:N</text>

  <path class="line" marker-end="url(#arrow)" d="M800 470 L800 530"/>
  <text class="label" x="814" y="505">1:N</text>

  <path class="line" marker-end="url(#arrow)" d="M960 640 L1130 590"/>
  <text class="label" x="1035" y="605">1:N</text>

  <path class="line" marker-end="url(#arrow)" d="M1330 420 L1330 500"/>
  <text class="label" x="1344" y="465">1:N</text>

  <path class="line" marker-end="url(#arrow)" d="M800 880 L800 950"/>
  <text class="label" x="814" y="920">1:N</text>

  <text class="smallText" x="1240" y="725">Tabela associativa que resolve</text>
  <text class="smallText" x="1210" y="750">o relacionamento N:N entre pedidos e materiais</text>
</svg>
